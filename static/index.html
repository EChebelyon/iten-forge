<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iten Forge</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="header">
    <h1>Iten Forge</h1>
    <p>Forged in the City of Champions</p>
  </div>

  <div class="controls">
    <div class="control-group">
      <label for="goal">Goal</label>
      <input type="text" id="goal" value="2:50:00" placeholder="H:MM:SS">
    </div>
    <div class="control-group">
      <label for="unit">Unit</label>
      <select id="unit">
        <option value="mi">mi</option>
        <option value="km">km</option>
      </select>
    </div>
    <button class="btn" id="generate">Generate</button>
  </div>

  <div class="paces" id="paces"></div>

  <div class="plan" id="plan">
    <div class="loading">Loading plan...</div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
